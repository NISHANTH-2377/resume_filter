  name: "Nishanth R"
  email: "nishanth2007annur@gmail.com"   # Used for all organizer communication
  phone: "+91-9894838243"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Nishanth R"
    email: "nishanth2007annur@gmail.com"
    role: "Team Lead"          # Optional, e.g. "Team Lead", "Backend", "Data"
  - name: "Pradeep S"
    email: "pradeepmks110@gmail.com"
    role: "Team Menber"
  - name: "Nithish M"
    email: "nithishm13062008@gmail.com"
